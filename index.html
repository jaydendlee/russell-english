<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Russell English — 스케쥴 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, remove, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCiWImaDwsqiKIhIW5yD_3KJniSV9Ke96M",
  authDomain:        "rei-student-weekly-schedule.firebaseapp.com",
  databaseURL:       "https://rei-student-weekly-schedule-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "rei-student-weekly-schedule",
  storageBucket:     "rei-student-weekly-schedule.firebasestorage.app",
  messagingSenderId: "248542852299",
  appId:             "1:248542852299:web:4012441acbb180e49b974e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DAYS = ['월','화','수','목','금','토'];
const COLORS = ['#1D9E75','#185FA5','#D85A30','#9E3DAA','#638F22','#B87417'];
const TEACHERS = ['엘T','정T','제이든T','휴T','미지정'];
const GRADES = ['초등','중1','중2','중3'];
const ADMIN_PW = 'russell1';

/* ========== 유틸 ========== */
function timeToMin(t) {
  if (!t) return null;
  var p = t.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}
function overlaps(as,ae,bs,be) {
  var a0=timeToMin(as),a1=timeToMin(ae),b0=timeToMin(bs),b1=timeToMin(be);
  if (a0===null||a1===null||b0===null||b1===null) return false;
  return a0<b1 && a1>b0;
}
function gradeColor(g) {
  return {'초등':'#1D9E75','중1':'#185FA5','중2':'#D85A30','중3':'#9E3DAA'}[g] || '#888';
}

/* ========== 탭 전환 ========== */
window.switchMode = function(mode) {
  document.getElementById('view-student').style.display = mode==='student' ? '' : 'none';
  document.getElementById('view-admin').style.display   = mode==='admin'   ? '' : 'none';
  document.getElementById('tab-student').className = 'tab'+(mode==='student'?' active':'');
  document.getElementById('tab-admin').className   = 'tab'+(mode==='admin'?' active':'');
};

/* ========== 학생 입력 ========== */
function buildDays() {
  var grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  DAYS.forEach(function(day,i) {
    var div = document.createElement('div');
    div.className = 'day-block';
    div.innerHTML = '<div class="day-header"><span class="day-label"><span class="dot" style="background:'+COLORS[i]+'"></span>'+day+'요일</span><button class="add-btn" onclick="addSlot(\''+ day +'\')">+ 추가</button></div><div class="slots" id="slots-'+ day +'"><p class="empty-note" id="empty-'+ day +'">아직 추가된 수업이 없어요</p></div>';
    grid.appendChild(div);
  });
}

window.addSlot = function(day) {
  var c = document.getElementById('slots-'+day);
  var e = document.getElementById('empty-'+day);
  if (e) e.remove();
  var row = document.createElement('div');
  row.className = 'slot-row';
  row.innerHTML = '<input type="time"/><span class="tilde">~</span><input type="time"/><input type="text" placeholder="과목/학원명"/><button class="rm-btn" onclick="this.closest(\'.slot-row\').remove();checkEmpty(\''+ day +'\')">×</button>';
  c.appendChild(row);
};

window.checkEmpty = function(day) {
  var c = document.getElementById('slots-'+day);
  if (c && !c.querySelector('.slot-row')) {
    c.innerHTML = '<p class="empty-note" id="empty-'+ day +'">아직 추가된 수업이 없어요</p>';
  }
};

window.submitSchedule = async function() {
  var errEl = document.getElementById('form-err');
  errEl.style.display = 'none';
  var name = document.getElementById('student-name').value.trim();
  if (!name) { errEl.textContent='이름을 입력해주세요.'; errEl.style.display='block'; return; }
  var grade = document.getElementById('student-grade').value;
  if (!grade) { errEl.textContent='학년을 선택해주세요.'; errEl.style.display='block'; return; }
  var days = {}; var hasAny = false;
  DAYS.forEach(function(day) {
    var rows = document.querySelectorAll('#slots-'+day+' .slot-row');
    var slots = [];
    rows.forEach(function(row) {
      var times = row.querySelectorAll('input[type="time"]');
      var start = times[0]?times[0].value:'';
      var end   = times[1]?times[1].value:'';
      var subj  = row.querySelector('input[type="text"]').value.trim();
      if (subj) { slots.push({start:start,end:end,subject:subj}); hasAny=true; }
    });
    days[day] = slots;
  });
  if (!hasAny) { errEl.textContent='최소 하나의 수업을 입력해주세요.'; errEl.style.display='block'; return; }
  var btn = document.querySelector('.submit-btn');
  btn.textContent='저장 중...'; btn.disabled=true;
  try {
    await set(ref(db,'schedules/'+name), {name:name,grade:grade,days:days,updatedAt:new Date().toISOString()});
    document.getElementById('student-form').innerHTML = '<div class="success"><div class="check">✓</div><p class="big">'+name+' 학생 스케쥴이 저장됐어요!</p><p class="small">선생님이 확인할 수 있어요.</p><button class="submit-btn" style="max-width:200px;margin:1.5rem auto 0" onclick="resetForm()">다시 입력하기</button></div>';
  } catch(e) {
    errEl.textContent='저장 실패: '+e.message; errEl.style.display='block';
    btn.textContent='스케쥴 저장하기'; btn.disabled=false;
  }
};

window.resetForm = function() {
  document.getElementById('student-form').innerHTML = studentFormHTML();
  buildDays();
};

function studentFormHTML() {
  return '<div class="name-row"><label>이름</label><input type="text" id="student-name" placeholder="이름을 입력하세요"/></div><div style="margin-bottom:1.25rem"><div style="font-size:13px;color:#555;font-weight:500;margin-bottom:8px">학년</div><div style="display:flex;gap:8px;flex-wrap:wrap" id="grade-btns"><button type="button" class="grade-btn" data-grade="초등" onclick="selectGrade(\'초등\')">초등</button><button type="button" class="grade-btn" data-grade="중1" onclick="selectGrade(\'중1\')">중1</button><button type="button" class="grade-btn" data-grade="중2" onclick="selectGrade(\'중2\')">중2</button><button type="button" class="grade-btn" data-grade="중3" onclick="selectGrade(\'중3\')">중3</button></div><input type="hidden" id="student-grade" value=""/></div><div id="days-grid"></div><div id="form-err" class="err" style="display:none"></div><button class="submit-btn" onclick="submitSchedule()">스케쥴 저장하기</button>';
}

window.selectGrade = function(grade) {
  document.getElementById('student-grade').value = grade;
  document.querySelectorAll('.grade-btn').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.grade===grade);
  });
};

/* ========== 관리자 로그인 ========== */
window.checkPw = function() {
  if (document.getElementById('pw-input').value === ADMIN_PW) {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = '';
    loadAdmin();
  } else {
    document.getElementById('pw-err').textContent = '비밀번호가 틀렸어요.';
  }
};

/* ========== 관리자 서브탭 ========== */
window.switchAdminTab = function(tab) {
  ['schedule','classes','placement'].forEach(function(t) {
    document.getElementById('admin-tab-'+t).style.display = t===tab ? '' : 'none';
    document.getElementById('atab-'+t).className = 'atab'+(t===tab?' active':'');
  });
  if (tab==='classes') loadClsList();
  if (tab==='placement') loadPlacementStudents();
};

/* ========== 스케쥴 관리 ========== */
var _allStudents = [];
var _currentPage = 1;
var _pageSize = 5;

window.loadAdmin = async function() {
  var grid = document.getElementById('admin-grid');
  grid.innerHTML = '<p style="padding:1rem;color:#888;font-size:13px">불러오는 중...</p>';
  try {
    var snap = await get(child(ref(db),'schedules'));
    if (!snap.exists()) {
      document.getElementById('student-count').textContent = '학생 0명';
      grid.innerHTML = '<p class="admin-empty">아직 스케쥴을 제출한 학생이 없어요.</p>';
      return;
    }
    _allStudents = Object.values(snap.val()).sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); });
    _currentPage = 1;
    document.getElementById('student-count').textContent = '학생 '+_allStudents.length+'명';
    renderPage(1);
  } catch(e) {
    grid.innerHTML = '<p class="admin-empty">불러오기 실패: '+e.message+'</p>';
  }
};

function buildStudentCard(s) {
  var updated = s.updatedAt ? new Date(s.updatedAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  var rows = '';
  DAYS.forEach(function(day,i) {
    var slots = (s.days&&s.days[day])||[];
    var pills = slots.length>0 ? slots.map(function(sl){ var t=sl.start&&sl.end?sl.start+'~'+sl.end+' ':sl.start?sl.start+' ':''; return '<span class="pill">'+t+sl.subject+'</span>'; }).join('') : '<span class="dash">—</span>';
    rows += '<tr><th style="color:'+COLORS[i]+'">'+day+'</th><td>'+pills+'</td></tr>';
  });
  var gradeBadge = s.grade ? '<span class="badge-grade">'+s.grade+'</span>' : '';
  var clsArr = Array.isArray(s.currentClass)?s.currentClass:(s.currentClass?[s.currentClass]:[]);
  var clsBadges = clsArr.length>0 ? clsArr.map(function(c){ return '<span class="badge-cls">'+c+'</span>'; }).join('') : '<span class="badge-none">반 미지정</span>';

  var card = document.createElement('div');
  card.className = 's-card';
  card.setAttribute('data-teacher', s.teacher&&TEACHERS.includes(s.teacher)?s.teacher:'미지정');
  card.setAttribute('data-name', s.name);

  var sBar = document.createElement('div'); sBar.className='s-bar';
  var nameDiv = document.createElement('div'); nameDiv.style.cssText='display:flex;align-items:center;gap:6px;flex-wrap:wrap';
  nameDiv.innerHTML = '<span class="s-name">'+s.name+'</span>'+gradeBadge+clsBadges;
  var btnDiv = document.createElement('div'); btnDiv.style.cssText='display:flex;align-items:center;gap:6px;flex-wrap:wrap';
  var timeSpan = document.createElement('span'); timeSpan.className='s-time'; timeSpan.textContent=updated+' 제출';

  var plBtn = document.createElement('button'); plBtn.className='placement-btn'; plBtn.textContent='배치 확인 ▾';
  plBtn.onclick = (function(n){ return function(){ window.togglePlacement(n,this); }; })(s.name);
  var editBtn = document.createElement('button'); editBtn.className='edit-btn'; editBtn.textContent='수정';
  editBtn.onclick = (function(n){ return function(){ window.openEdit(n); }; })(s.name);
  var delBtn = document.createElement('button'); delBtn.className='del-btn'; delBtn.textContent='삭제';
  delBtn.onclick = (function(n){ return function(){ window.deleteStudent(n); }; })(s.name);

  btnDiv.appendChild(timeSpan); btnDiv.appendChild(plBtn); btnDiv.appendChild(editBtn); btnDiv.appendChild(delBtn);
  sBar.appendChild(nameDiv); sBar.appendChild(btnDiv);

  var table = document.createElement('table'); table.className='w-table';
  table.innerHTML = '<tbody>'+rows+'</tbody>';

  var plPanel = document.createElement('div');
  plPanel.id = 'pl-'+s.name;
  plPanel.style.cssText = 'display:none;padding:8px 16px 12px;border-top:1px solid #f0f0f0';
  plPanel.innerHTML = '<div id="pl-grid-'+s.name+'" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px"></div>';

  card.appendChild(sBar); card.appendChild(table); card.appendChild(plPanel);
  return card;
}

/* ========== 학생 검색 ========== */
window.searchStudent = function() {
  var q = document.getElementById('student-search').value.trim().toLowerCase();
  var clearBtn = document.getElementById('clear-search-btn');
  if (!q) { clearSearch(); return; }
  clearBtn.style.display = '';
  // Search across all students, show results without pagination
  var grid = document.getElementById('admin-grid');
  grid.innerHTML = '';
  document.getElementById('admin-pagination').style.display = 'none';
  var results = _allStudents.filter(function(s){ return s.name.toLowerCase().includes(q); });
  if (!results.length) {
    grid.innerHTML = '<p class="admin-empty">검색 결과가 없어요</p>';
    return;
  }
  results.forEach(function(s){ grid.appendChild(buildStudentCard(s)); });
};

window.clearSearch = function() {
  document.getElementById('student-search').value = '';
  document.getElementById('clear-search-btn').style.display = 'none';
  if (_allStudents.length) renderPage(1);
};

/* ========== 배치 확인 인라인 ========== */
window.togglePlacement = async function(name, btn) {
  var panel = document.getElementById('pl-'+name);
  var grid  = document.getElementById('pl-grid-'+name);
  if (!panel) return;
  var isOpen = panel.style.display !== 'none';
  if (isOpen) { panel.style.display='none'; btn.textContent='배치 확인 ▾'; return; }
  panel.style.display=''; btn.textContent='닫기 ▴';
  grid.innerHTML = '<p style="font-size:12px;color:#aaa">분석 중...</p>';
  try {
    var clsSnap = await get(child(ref(db),'classes'));
    var allCls = clsSnap.exists()&&Array.isArray(clsSnap.val())?clsSnap.val():[];
    if (!allCls.length) { grid.innerHTML='<p style="font-size:12px;color:#aaa">반 설정 탭에서 반을 먼저 등록해주세요</p>'; return; }
    var sSnap = await get(child(ref(db),'schedules/'+name));
    if (!sSnap.exists()) { grid.innerHTML='<p style="font-size:12px;color:#aaa">데이터 없음</p>'; return; }
    var student = sSnap.val();
    var studentGrade = student.grade||'';
    var currentClasses = Array.isArray(student.currentClass)?student.currentClass:(student.currentClass?[student.currentClass]:[]);
    var cls = allCls.filter(function(c) {
      return (!studentGrade||!c.grade||c.grade===studentGrade) && !currentClasses.includes(c.name);
    });
    if (!cls.length) { grid.innerHTML='<p style="font-size:12px;color:#aaa">이동 가능한 '+(studentGrade||'')+' 반이 없어요</p>'; return; }
    var busy = [];
    Object.entries(student.days||{}).forEach(function(entry) {
      entry[1].forEach(function(sl){ if(sl.subject) busy.push({day:entry[0],start:sl.start,end:sl.end,label:sl.subject}); });
    });
    grid.innerHTML = cls.map(function(c) {
      var conflicts = [];
      c.slots.forEach(function(cs) {
        busy.forEach(function(sb) {
          if (cs.day===sb.day && overlaps(cs.start,cs.end,sb.start,sb.end))
            conflicts.push(cs.day+' '+cs.start+'~'+cs.end+' ← '+sb.label+' 겹침');
        });
      });
      var ok = conflicts.length===0;
      var slotBadges = c.slots.map(function(s){ return '<span style="font-size:10px;background:#06162C;color:#fff;border-radius:3px;padding:1px 6px;display:inline-block;margin:1px">'+s.day+' '+s.start+'~'+s.end+'</span>'; }).join('');
      return '<div style="border-radius:8px;padding:10px 12px;border:1px solid;'+(ok?'background:#E1F5EE;border-color:#9FE1CB':'background:#FCEBEB;border-color:#F7C1C1;opacity:.7')+'"><div style="font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:5px;'+(ok?'background:#1D9E75;color:#fff':'background:#A32D2D;color:#fff')+'">'+(ok?'✓ 가능':'✗ 불가')+'</div><div style="font-size:13px;font-weight:600;margin-bottom:3px;'+(ok?'color:#0F6E56':'color:#A32D2D')+'">'+c.name+'</div><div style="margin-bottom:3px">'+slotBadges+'</div>'+(ok?'<div style="font-size:11px;color:#0F6E56">충돌 없음</div>':'<div style="font-size:11px;color:#A32D2D">'+conflicts.map(function(cf){ return '<div>• '+cf+'</div>'; }).join('')+'</div>')+'</div>';
    }).join('');
  } catch(e) { grid.innerHTML='<p style="font-size:12px;color:#e24b4a">오류: '+e.message+'</p>'; }
};

/* ========== 학생 수정 ========== */
window.openEdit = async function(name) {
  var snap = await get(child(ref(db),'schedules/'+name));
  if (!snap.exists()) return;
  var s = snap.val();
  var clsSnap = await get(child(ref(db),'classes'));
  var cls = clsSnap.exists()&&Array.isArray(clsSnap.val())?clsSnap.val():[];
  var currentClasses = Array.isArray(s.currentClass)?s.currentClass:(s.currentClass?[s.currentClass]:[]);
  var currentGrade = s.grade||'';

  var gradeBtnsHTML = GRADES.map(function(g) {
    var sel = currentGrade===g;
    return '<button type="button" class="edit-grade-btn" data-g="'+g+'" style="padding:6px 16px;border-radius:8px;border:2px solid '+(sel?'#06162C':'#ddd')+';background:'+(sel?'#06162C':'#fff')+';color:'+(sel?'#fff':'#aaa')+';font-size:13px;font-weight:'+(sel?'600':'500')+';cursor:pointer;font-family:inherit">'+ g +'</button>';
  }).join('');

  var clsBtnsHTML = cls.length===0 ? '<div style="font-size:12px;color:#aaa">반 설정 탭에서 반을 먼저 등록해주세요</div>' :
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+cls.map(function(c) {
      var checked = currentClasses.includes(c.name);
      return '<label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 12px;border-radius:6px;font-size:13px;border:1px solid '+(checked?'#06162C':'#ddd')+';background:'+(checked?'#06162C':'#fff')+';color:'+(checked?'#fff':'#555')+'"><input type="checkbox" value="'+c.name+'" '+(checked?'checked':'')+' style="display:none" onchange="updateClsBadge(this)">'+c.name+'</label>';
    }).join('')+'</div>';

  var teacherBtnsHTML = TEACHERS.map(function(t) {
    var sel = (s.teacher||'')=== t;
    return '<button type="button" onclick="setEditTeacher(\''+ t +'\')" style="padding:5px 14px;border-radius:6px;font-size:13px;border:1px solid '+(sel?'#06162C':'#ddd')+';background:'+(sel?'#06162C':'#fff')+';color:'+(sel?'#fff':'#555')+';cursor:pointer;font-family:inherit">'+ t +'</button>';
  }).join('');

  var daysHTML = '';
  DAYS.forEach(function(day,i) {
    var slots = (s.days&&s.days[day])||[];
    var slotsHTML = slots.length===0 ? '<p class="empty-note" id="edit-empty-'+ day +'">아직 추가된 수업이 없어요</p>' :
      slots.map(function(sl){ return '<div class="slot-row"><input type="time" value="'+(sl.start||'')+'"/><span class="tilde">~</span><input type="time" value="'+(sl.end||'')+'"/><input type="text" value="'+(sl.subject||'')+'" placeholder="과목/학원명"/><button class="rm-btn" onclick="this.closest(\'.slot-row\').remove();checkEditEmpty(\''+ day +'\')">×</button></div>'; }).join('');
    daysHTML += '<div class="day-block"><div class="day-header"><span class="day-label"><span class="dot" style="background:'+COLORS[i]+'"></span>'+ day +'요일</span><button class="add-btn" onclick="addEditSlot(\''+ day +'\')">+ 추가</button></div><div class="slots" id="edit-slots-'+ day +'">'+slotsHTML+'</div></div>';
  });

  var overlay = document.createElement('div');
  overlay.id = 'edit-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
  overlay.innerHTML = '<div style="background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;"><span style="font-size:16px;font-weight:600;color:#06162C;">'+ name +' 학생 수정</span><button onclick="document.getElementById(\'edit-overlay\').remove()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#aaa;line-height:1;">×</button></div><div style="background:#f9f9f7;border-radius:10px;padding:12px 14px;margin-bottom:1rem;"><div style="font-size:12px;color:#555;font-weight:500;margin-bottom:8px">학년</div><div id="edit-grade-wrap" style="display:flex;gap:6px;flex-wrap:wrap">'+gradeBtnsHTML+'</div><input type="hidden" id="edit-student-grade" value="'+currentGrade+'"/></div><div style="background:#E8ECF2;border-radius:10px;padding:12px 14px;margin-bottom:1rem;"><div style="font-size:12px;color:#555;font-weight:500;margin-bottom:8px">현재 수업</div>'+clsBtnsHTML+'</div><div style="background:#f9f9f7;border-radius:10px;padding:12px 14px;margin-bottom:1.25rem;"><div style="font-size:12px;color:#555;font-weight:500;margin-bottom:8px">담당 선생님</div><div id="edit-teacher-wrap" style="display:flex;gap:6px;flex-wrap:wrap">'+ teacherBtnsHTML +'</div><input type="hidden" id="edit-teacher-val" value="'+(s.teacher||'')+'"/></div>'+ daysHTML +'<div id="edit-err" class="err" style="display:none;margin-top:8px;"></div><button class="submit-btn" onclick="saveEdit(\''+ name +'\')">저장하기</button></div>';
  document.body.appendChild(overlay);

  overlay.querySelectorAll('.edit-grade-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { window.setEditGrade(this.getAttribute('data-g')); });
  });
};

window.setEditGrade = function(grade) {
  document.getElementById('edit-student-grade').value = grade;
  document.querySelectorAll('#edit-overlay .edit-grade-btn').forEach(function(btn) {
    var sel = btn.getAttribute('data-g')===grade;
    btn.style.background=sel?'#06162C':'#fff'; btn.style.color=sel?'#fff':'#aaa'; btn.style.borderColor=sel?'#06162C':'#ddd'; btn.style.fontWeight=sel?'600':'500';
  });
};

window.setEditTeacher = function(teacher) {
  document.getElementById('edit-teacher-val').value = teacher;
  document.querySelectorAll('#edit-overlay #edit-teacher-wrap button').forEach(function(btn) {
    var sel = btn.textContent===teacher;

  document.getElementById('swap-step2').style.display = '';
  document.getElementById('swap-step3').style.display = 'none';
  document.getElementById('swap-candidates-wrap').style.display = 'none';
}

window.selectSwapClass = async function(clsName) {
  _swapTargetCls = _swapCls.find(function(c){ return c.name===clsName; });
  if (!_swapTargetCls) return;
  document.querySelectorAll('#swap-cls-btns button').forEach(function(btn){
    var sel = btn.textContent===clsName;
    btn.style.background=sel?'#06162C':'#fff'; btn.style.color=sel?'#fff':'#555'; btn.style.borderColor=sel?'#06162C':'#ddd'; btn.style.fontWeight=sel?'500':'400';
  });
  document.getElementById('swap-step3').style.display = 'none';
  document.getElementById('swap-cls-label').textContent = clsName+' 학생 목록 — 스왑할 학생 클릭';
  document.getElementById('swap-candidates-wrap').style.display = '';
  var candDiv = document.getElementById('swap-candidates');
  candDiv.innerHTML = '<p style="font-size:12px;color:#aaa">불러오는 중...</p>';
  try {
    var snap = await get(child(ref(db), 'schedules'));
    if (!snap.exists()) { candDiv.innerHTML='<p style="font-size:12px;color:#aaa">학생 없음</p>'; return; }
    var allStudents = Object.values(snap.val());
    var members = allStudents.filter(function(st){
      var ca = Array.isArray(st.currentClass)?st.currentClass:(st.currentClass?[st.currentClass]:[]);
      return ca.includes(clsName);
    }).sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); });
    if (!members.length) { candDiv.innerHTML='<p style="font-size:12px;color:#aaa">해당 반 학생이 없어요 (수정에서 현재 수업 지정 필요)</p>'; return; }
    var s = _swapStudent;
    var sBusy = [];
    Object.entries(s.days||{}).forEach(function(e){ e[1].forEach(function(sl){ if(sl.subject) sBusy.push({day:e[0],start:sl.start,end:sl.end,label:sl.subject}); }); });
    candDiv.innerHTML = members.map(function(m) {
      var mBusy = [];
      Object.entries(m.days||{}).forEach(function(e){ e[1].forEach(function(sl){ if(sl.subject) mBusy.push({day:e[0],start:sl.start,end:sl.end,label:sl.subject}); }); });
      // Check if m can go to s's current class
      var sCurrentCls = _swapCls.find(function(c){
        var ca = Array.isArray(s.currentClass)?s.currentClass:(s.currentClass?[s.currentClass]:[]);
        return ca.length && c.name===ca[0];
      });
      var mCanGo = true;
      if (sCurrentCls) {
        sCurrentCls.slots.forEach(function(cs){ mBusy.forEach(function(mb){ if(cs.day===mb.day&&overlaps(cs.start,cs.end,mb.start,mb.end)) mCanGo=false; }); });
      }
      // Check if s can go to target class
      var sCanGo = true;
      _swapTargetCls.slots.forEach(function(cs){ sBusy.forEach(function(sb){ if(cs.day===sb.day&&overlaps(cs.start,cs.end,sb.start,sb.end)) sCanGo=false; }); });
      var bothOk = sCanGo && mCanGo;
      var tag = bothOk
        ? '<span style="font-size:10px;font-weight:600;color:#0F6E56;background:#E1F5EE;border-radius:4px;padding:2px 7px">✓ 가능</span>'
        : '<span style="font-size:10px;font-weight:600;color:#A32D2D;background:#FCEBEB;border-radius:4px;padding:2px 7px">✗ 불가</span>';
      var schedText = mBusy.slice(0,3).map(function(b){ return b.day+' '+b.start+'~'+b.end; }).join(' · ')||'';
      return '<div onclick="showSwapResult(\''+ m.name +'\')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid #eee;background:#fff;cursor:pointer;margin-bottom:6px"><div style="width:26px;height:26px;border-radius:50%;background:#06162C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">'+ m.name[0] +'</div><span style="font-size:13px;font-weight:600;color:#1a1a1a;flex:1">'+ m.name +'</span><span style="font-size:11px;color:#888">'+ schedText +'</span>'+ tag +'</div>';
    }).join('');
  } catch(e) { candDiv.innerHTML='<p style="font-size:12px;color:#e24b4a">오류: '+e.message+'</p>'; }
};

window.showSwapResult = async function(targetName) {
  var s = _swapStudent;
  var tc = _swapTargetCls;
  if (!s||!tc) return;
  var tSnap = await get(child(ref(db), 'schedules/'+targetName));
  if (!tSnap.exists()) return;
  var t = tSnap.val();
  var sBusy=[], tBusy=[];
  Object.entries(s.days||{}).forEach(function(e){ e[1].forEach(function(sl){ if(sl.subject) sBusy.push({day:e[0],start:sl.start,end:sl.end,label:sl.subject}); }); });
  Object.entries(t.days||{}).forEach(function(e){ e[1].forEach(function(sl){ if(sl.subject) tBusy.push({day:e[0],start:sl.start,end:sl.end,label:sl.subject}); }); });
  var sCurrentCls = _swapCls.find(function(c){
    var ca = Array.isArray(s.currentClass)?s.currentClass:(s.currentClass?[s.currentClass]:[]);
    return ca.length && c.name===ca[0];
  });
  // A → target class conflicts
  var aConflicts=[];
  tc.slots.forEach(function(cs){ sBusy.forEach(function(sb){ if(cs.day===sb.day&&overlaps(cs.start,cs.end,sb.start,sb.end)) aConflicts.push(cs.day+' '+cs.start+'~'+cs.end+' ← '+sb.label+' 겹침'); }); });
  var aOk = aConflicts.length===0;
  // B → A's current class conflicts
  var bConflicts=[];
  if (sCurrentCls) {
    sCurrentCls.slots.forEach(function(cs){ tBusy.forEach(function(tb){ if(cs.day===tb.day&&overlaps(cs.start,cs.end,tb.start,tb.end)) bConflicts.push(cs.day+' '+cs.start+'~'+cs.end+' ← '+tb.label+' 겹침'); }); });
  }
  var bOk = bConflicts.length===0;
  var bothOk = aOk && bOk;
  var ca = Array.isArray(s.currentClass)?s.currentClass:(s.currentClass?[s.currentClass]:[]);
  var sCurrentName = ca.length?ca[0]:'현재반';
  function slotBadges(cls) {
    if (!cls) return '';
    return cls.slots.map(function(sl){ return '<span style="font-size:10px;background:#06162C;color:#fff;border-radius:3px;padding:1px 6px;display:inline-block;margin:1px">'+ sl.day +' '+ sl.start +'~'+ sl.end +'</span>'; }).join('');
  }
  document.getElementById('swap-result-title').textContent = s.name+' ↔ '+targetName+' 스왑 결과';
  document.getElementById('swap-result-grid').innerHTML =
    '<div style="border-radius:8px;padding:10px 12px;border:1px solid;'+(aOk?'background:#E1F5EE;border-color:#9FE1CB':'background:#FCEBEB;border-color:#F7C1C1')+'"><div style="font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:5px;'+(aOk?'background:#1D9E75;color:#fff':'background:#A32D2D;color:#fff')+'">'+(aOk?'✓ 가능':'✗ 불가')+'</div><div style="font-size:12px;font-weight:500;margin-bottom:4px;'+(aOk?'color:#0F6E56':'color:#A32D2D')+'">'+ s.name +' → '+ tc.name +'</div>'+ slotBadges(tc) +(aOk?'<div style="font-size:11px;color:#0F6E56;margin-top:3px">충돌 없음</div>':'<div style="font-size:11px;color:#A32D2D;margin-top:3px">'+aConflicts.map(function(c){ return '<div>• '+c+'</div>'; }).join('')+'</div>')+'</div>' +
    '<div style="border-radius:8px;padding:10px 12px;border:1px solid;'+(bOk?'background:#E1F5EE;border-color:#9FE1CB':'background:#FCEBEB;border-color:#F7C1C1')+'"><div style="font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:5px;'+(bOk?'background:#1D9E75;color:#fff':'background:#A32D2D;color:#fff')+'">'+(bOk?'✓ 가능':'✗ 불가')+'</div><div style="font-size:12px;font-weight:500;margin-bottom:4px;'+(bOk?'color:#0F6E56':'color:#A32D2D')+'">'+ targetName +' → '+ sCurrentName +'</div>'+(sCurrentCls?slotBadges(sCurrentCls):'')+( !sCurrentCls?'<div style="font-size:11px;color:#aaa;margin-top:3px">'+ s.name +'의 현재 반이 없어요</div>':bOk?'<div style="font-size:11px;color:#0F6E56;margin-top:3px">충돌 없음</div>':'<div style="font-size:11px;color:#A32D2D;margin-top:3px">'+bConflicts.map(function(c){ return '<div>• '+c+'</div>'; }).join('')+'</div>')+'</div>';
  var banner = document.getElementById('swap-final-banner');
  if (bothOk) {
    banner.style.cssText='margin-top:10px;padding:10px 14px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB';
    banner.textContent = '✓ 스왑 가능 — 두 학생 모두 충돌 없음';
  } else {
    banner.style.cssText='margin-top:10px;padding:10px 14px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1';
    var who = !aOk&&!bOk?'두 학생 모두':(!aOk?s.name:targetName);
    banner.textContent = '⚠ 스왑 불가 — '+who+' 스케쥴 충돌';
  }
  document.getElementById('swap-step3').style.display = '';
};

          <div style="display:flex;gap:8px;margin-bottom:1rem">

            <button onclick="searchStudent()" style="padding:9px 20px;background:#06162C;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0">검색</button>
            <button onclick="clearSearch()" id="clear-search-btn" style="display:none;padding:9px 14px;background:#fff;color:#555;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0">초기화</button>
          </div>

          <!-- STEP 1 -->
          <div style="background:#fff;border:1px solid #eee;border-radius:12px;padding:1.25rem;margin-bottom:10px">
            <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="width:20px;height:20px;border-radius:50%;background:#06162C;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">1</span>옮길 학생 선택</div>

              <button onclick="swapSearch()" style="padding:9px 18px;background:#06162C;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0">검색</button>

                <div id="swap-avatar" style="width:30px;height:30px;border-radius:50%;background:#06162C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0"></div>
                <div>

                  <span id="swap-cls-badge" style="font-size:10px;background:#06162C;color:#fff;border-radius:4px;padding:2px 7px;margin-left:4px"></span>
